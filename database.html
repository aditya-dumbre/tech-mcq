<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐍 Database Quiz</title>
<style>
  @font-face { font-family:'Display'; src:local('Futura'),local('Century Gothic'),local('Trebuchet MS'); }
  @font-face { font-family:'Mono'; src:local('Courier New'),local('Courier'); }
  :root { --bg:#07090f; --card:#13161f; --border:#1e2235; --text:#dde2f0; --muted:#5a6285; --accent:#a78bfa; }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Display','Trebuchet MS',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  body::before { content:''; position:fixed; inset:0; background-image:radial-gradient(circle,#1e2235 1px,transparent 1px); background-size:32px 32px; opacity:.55; pointer-events:none; }
  .box { position:relative; z-index:1; text-align:center; padding:48px 40px; background:var(--card); border:1px solid var(--border); border-radius:20px; max-width:480px; width:90%; }
  .icon { font-size:3rem; margin-bottom:20px; }
  .tag { display:inline-block; font-family:'Mono',monospace; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); background:color-mix(in srgb,var(--accent) 12%,transparent); border:1px solid color-mix(in srgb,var(--accent) 25%,transparent); padding:4px 12px; border-radius:99px; margin-bottom:16px; }
  h1 { font-size:1.6rem; font-weight:800; letter-spacing:-.02em; margin-bottom:10px; }
  p { font-family:'Mono',monospace; font-size:.8rem; color:var(--muted); line-height:1.6; margin-bottom:32px; }
  .placeholder-box { border:2px dashed var(--border); border-radius:12px; padding:32px 24px; margin-bottom:28px; color:var(--muted); font-family:'Mono',monospace; font-size:.78rem; line-height:1.9; text-align:left; }
  .placeholder-box code { color:var(--accent); background:color-mix(in srgb,var(--accent) 10%,transparent); padding:2px 6px; border-radius:4px; }
  .back { display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:var(--muted); font-family:'Mono',monospace; font-size:.78rem; border:1px solid var(--border); padding:9px 18px; border-radius:8px; transition:border-color .2s,color .2s; }
  .back:hover { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🗄️</div>
  <div class="tag">quiz · placeholder</div>
  <h1>Database</h1>
  <p>This file is ready. Drop your quiz content in here to activate this topic.</p>
  <div class="placeholder-box">
    📄 File: <code>database.html</code><br>
    📁 Path: <code>D:\PGCP AI\Code\python\mock\</code><br>
    🔗 Links from: <code>index.html</code>
  </div>
  <a class="back" href="index.html">← Back to Home</a>
</div>
</body>
</html>
